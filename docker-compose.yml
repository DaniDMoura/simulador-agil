services:
  web:
    build: ./apps/web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  api:
    build: ./apps/api
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy 
    networks:
      - net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - net

networks:
  net:
    driver: bridge
