spring.application.name=api

client.question-client.url=https://api.enem.dev

spring.data.redis.host=redis
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Comma-separated list of trusted proxy IPs. Empty = ignore X-Forwarded-For.
rate-limit.trusted-proxies=

# CORS allowed origins (dev value; override via env in production)
cors.allowed-origins=http://localhost,https://simulado-agil.vercel.app,http://web

# Redis config (optional - if not available, falls back to in-memory cache)
# spring.data.redis.host=redis
# spring.data.redis.port=6379

feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=5000

logging.level.org.springframework.retry=DEBUG
